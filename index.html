<!DOCTYPE html>
<html lang="my">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kyawngar-Hub - Video & Ad Center</title>
  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen p-4 flex flex-col items-center">

  <!-- Header -->
  <header class="w-full max-w-2xl text-center py-6">
    <h1 class="text-3xl font-extrabold text-blue-600">Kyawngar-Hub</h1>
    <p class="text-gray-600 mt-1">ဗီဒီယိုနှင့် ကြော်ငြာများ တင်ရန်/ကြည့်ရှုရန်</p>
  </header>

  <main class="w-full max-w-2xl space-y-8">
    
    <!-- ၁။ ကြော်ငြာ/ဗီဒီယို တင်ရန် ဖောင် -->
    <section class="bg-white rounded-2xl shadow-md p-6 border border-gray-200">
      <h2 class="text-xl font-bold text-gray-800 mb-4 border-b pb-2">📢 ကြော်ငြာအသစ် တင်ရန်</h2>

      <form id="uploadForm" class="space-y-4">
        <!-- ကြော်ငြာ ခေါင်းစဉ် -->
        <div>
          <label class="block text-sm font-semibold text-gray-700 mb-1">ကြော်ငြာ ခေါင်းစဉ် (Title)</label>
          <input type="text" id="adTitle" required class="w-full border border-gray-300 rounded-lg p-2.5 focus:ring-2 focus:ring-blue-500 focus:outline-none transition" placeholder="ခေါင်းစဉ် ရေးပါ...">
        </div>

        <!-- အသေးစိတ် ဖော်ပြချက် -->
        <div>
          <label class="block text-sm font-semibold text-gray-700 mb-1">အသေးစိတ် ဖော်ပြချက် (Description)</label>
          <textarea id="adDescription" rows="3" class="w-full border border-gray-300 rounded-lg p-2.5 focus:ring-2 focus:ring-blue-500 focus:outline-none transition" placeholder="အသေးစိတ် ရေးပါ..."></textarea>
        </div>

        <!-- ဖိုင်ရွေးရန် (Video သို့မဟုတ် Image) -->
        <div>
          <label class="block text-sm font-semibold text-gray-700 mb-1">Video သို့မဟုတ် Image ရွေးပါ</label>
          <input type="file" id="mediaFile" accept="video/*,image/*" required class="w-full text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-lg file:border-0 file:text-sm file:font-semibold file:bg-blue-50 file:text-blue-700 hover:file:bg-blue-100 cursor-pointer">
        </div>

        <!-- Submit Button -->
        <button type="submit" id="submitBtn" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-lg shadow transition duration-200">
          ကြော်ငြာ တင်မည်
        </button>
      </form>

      <!-- Status Message -->
      <div id="statusMsg" class="mt-4 text-center font-semibold text-sm hidden p-3 rounded-lg"></div>
    </section>

    <!-- ၂။ တင်ထားသော ကြော်ငြာများ ပြသသည့်နေရာ -->
    <section class="bg-white rounded-2xl shadow-md p-6 border border-gray-200">
      <h2 class="text-xl font-bold text-gray-800 mb-4 border-b pb-2">🎬 တင်ထားသော ကြော်ငြာများ</h2>
      
      <!-- Ads Feed Container -->
      <div id="adsFeed" class="space-y-6">
        <p class="text-center text-gray-500 py-4">Data များ ယူနေပါသည်... ခေတ္တစောင့်ပါ...</p>
      </div>
    </section>

  </main>

  <!-- Firebase SDKs -->
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-storage-compat.js"></script>

  <script>
    // Firebase Config (ဆရာ ပေးထားသော Config အပြည့်အစုံ)
    const firebaseConfig = {
      apiKey: "AIzaSyAI0zkpynjthemXveJY9ghDwAEMxwZUgxk",
      authDomain: "kyawngar-hub.firebaseapp.com",
      databaseURL: "https://kyawngar-hub-default-rtdb.asia-southeast1.firebasedatabase.app",
      projectId: "kyawngar-hub",
      storageBucket: "kyawngar-hub.firebasestorage.app",
      messagingSenderId: "518183426355",
      appId: "1:518183426355:web:db11ad6cbc6b01c1a8c646",
      measurementId: "G-JMQ8L4S12Q"
    };

    // Firebase ကို Initialize လုပ်ခြင်း
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const storage = firebase.storage();

    const form = document.getElementById('uploadForm');
    const statusMsg = document.getElementById('statusMsg');
    const submitBtn = document.getElementById('submitBtn');
    const adsFeed = document.getElementById('adsFeed');

    // --- ၁။ ကြော်ငြာ/ဗီဒီယို တင်ခြင်း လုပ်ဆောင်ချက် ---
    form.addEventListener('submit', async (e) => {
      e.preventDefault();

      const title = document.getElementById('adTitle').value;
      const description = document.getElementById('adDescription').value;
      const fileInput = document.getElementById('mediaFile');
      const file = fileInput.files[0];

      if (!file) {
        alert("ကျေးဇူးပြု၍ ဖိုင်တစ်ခု ရွေးပေးပါ!");
        return;
      }

      // UI ပြင်ဆင်ခြင်း
      submitBtn.disabled = true;
      submitBtn.innerText = "Upload တင်နေသည်...";
      statusMsg.className = "mt-4 text-center font-semibold text-sm block bg-blue-50 text-blue-700 border border-blue-200 p-3 rounded-lg";
      statusMsg.innerText = "ဖိုင် တင်နေပါသည်... ခေတ္တစောင့်ပါ";

      try {
        // Firebase Storage သို့ ဖိုင်တင်ခြင်း
        const fileName = Date.now() + "_" + file.name;
        const storageRef = storage.ref('media/' + fileName);
        const uploadTask = await storageRef.put(file);

        // Download URL နှင့် File Type ရယူခြင်း
        const downloadURL = await uploadTask.ref.getDownloadURL();
        const resourceType = file.type.startsWith('video') ? 'video' : 'image';

        // Firestore ထဲသို့ Data သိမ်းခြင်း
        statusMsg.innerText = "Database ထဲသို့ Data သိမ်းဆည်းနေပါသည်...";

        await db.collection("ads").add({
          title: title,
          description: description,
          mediaUrl: downloadURL,
          mediaType: resourceType,
          createdAt: firebase.firestore.FieldValue.serverTimestamp()
        });

        // အောင်မြင်ကြောင်း ပြသခြင်း
        statusMsg.className = "mt-4 text-center font-semibold text-sm block bg-green-50 text-green-700 border border-green-200 p-3 rounded-lg";
        statusMsg.innerText = "🎉 ကြော်ငြာ အောင်မြင်စွာ တင်ပြီးပါပြီ!";
        form.reset();

      } catch (error) {
        console.error("Error:", error);
        statusMsg.className = "mt-4 text-center font-semibold text-sm block bg-red-50 text-red-700 border border-red-200 p-3 rounded-lg";
        statusMsg.innerText = "❌ အမှားအယွင်း ရှိနေပါသည်: " + error.message;
      } finally {
        submitBtn.disabled = false;
        submitBtn.innerText = "ကြော်ငြာ တင်မည်";
      }
    });

    // --- ၂။ Firestore ထဲမှ ကြော်ငြာများကို Real-time ဆွဲထုတ်ပြသခြင်း ---
    db.collection("ads").orderBy("createdAt", "desc").onSnapshot((snapshot) => {
      if (snapshot.empty) {
        adsFeed.innerHTML = `<p class="text-center text-gray-500 py-4">တင်ထားသော ကြော်ငြာများ မရှိသေးပါ။</p>`;
        return;
      }

      let html = "";
      snapshot.forEach((doc) => {
        const data = doc.data();
        const mediaHtml = data.mediaType === 'video' 
          ? `<video src="${data.mediaUrl}" controls class="w-full max-h-96 rounded-lg bg-black mt-3"></video>`
          : `<img src="${data.mediaUrl}" class="w-full max-h-96 object-cover rounded-lg mt-3" alt="Ad Image">`;

        html += `
          <div class="border border-gray-200 rounded-xl p-4 bg-gray-50 shadow-sm">
            <h3 class="font-bold text-lg text-gray-800">${data.title}</h3>
            <p class="text-gray-600 text-sm mt-1">${data.description || ''}</p>
            ${mediaHtml}
          </div>
        `;
      });

      adsFeed.innerHTML = html;
    }, (error) => {
      console.error("Error fetching ads:", error);
      adsFeed.innerHTML = `<p class="text-center text-red-500 py-4">Data များ ဆွဲထုတ်ရာတွင် အမှားရှိနေပါသည်: ${error.message}</p>`;
    });
  </script>
</body>
  </html>
